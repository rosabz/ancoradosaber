<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Cadastro</title>
  <style>
    .form-container {
      max-width: 380px;
    }
  </style>
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container form-container">
  
  <div id="card-login" class="card shadow-sm p-4">
    <h1 class="h3 mb-3 fw-normal text-center">Login</h1>
    <form onsubmit="event.preventDefault(); entrar();">
      <div class="form-floating mb-2">
        <input type="email" class="form-control" id="emailLogin" placeholder="nome@exemplo.com">
        <label for="emailLogin">E-mail:</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="senhaLogin" placeholder="Senha">
        <label for="senhaLogin">Senha:</label>
      </div>
      
      <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
      
      <div class="mt-3 text-center">
        <small>Não tem conta? <a href="javascript:void(0)" onclick="alternarTelas()">Cadastre-se aqui</a></small>
      </div>
    </form>
  </div>

  <div id="card-cadastro" class="card shadow-sm p-4 d-none">
    <h1 class="h3 mb-3 fw-normal text-center">Cadastro</h1>
    <form onsubmit="event.preventDefault(); cadastrar();">
      <div class="mb-3">
        <label class="form-label">E-mail:</label>
        <input type="email" class="form-control" id="emailCad" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Senha:</label>
        <input type="password" class="form-control" id="senhaCad" required>
      </div>
      
      <button class="btn btn-success w-100 py-2" type="submit">Criar</button>
      
      <div class="mt-3 text-center">
        <small><a href="javascript:void(0)" onclick="alternarTelas()">Login</a></small>
      </div>
    </form>
  </div>

</div>

<script>
  function alternarTelas() {
    const login = document.getElementById('card-login');
    const cadastro = document.getElementById('card-cadastro');
    login.classList.toggle('d-none');
    cadastro.classList.toggle('d-none');
  }

  function cadastrar() {

    alert("Cadastro realizado! Redirecionando para o login...");
    alternarTelas();
  }

  function entrar() {
    const email = document.getElementById('emailLogin').value;
    const senha = document.getElementById('senhaLogin').value;

    if (email !== "" && senha !== "") {
      window.location.href = "index.html";
    } else {
      alert("Preencha o email e a senha!");
    }
  }
</script>

</body>
</html>
