<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tarefas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3 class="mb-3">Minhas Tarefas</h3>

<div class="card p-3 mb-3">
    <input class="form-control mb-2" placeholder="Nome da tarefa">
    <select class="form-select mb-2">
        <option>Matemática</option>
        <option>História</option>
    </select>
    <button class="btn btn-primary">Adicionar</button>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Tarefa</th>
            <th>Matéria</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Estudar Matemática</td>
            <td>Matemática</td>
            <td>Pendente</td>
        </tr>
        <tr>
            <td>Revisar História</td>
            <td>História</td>
            <td>Concluída</td>
        </tr>
    </tbody>
</table>

</div>

</body>
</html>
